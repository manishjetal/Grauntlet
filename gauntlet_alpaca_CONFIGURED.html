<script>
/* ============================================================
   STRATEGY SIGNAL ALERTS  (added 2026-06-22)
   Fires a toast + beep + browser notification (+ optional webhook)
   whenever the strategy on ANY chart prints a NEW buy/sell — the same
   signal drawn as the chart's ▲/▼ marker (uses chart.signals 1:1).
   Default: alerts on the CLOSED bar (no repaint). Toggle "instant" to
   alert the moment a signal appears on the forming bar.
   ============================================================ */
(function(){
  var LS='gl_sigalerts';
  var cfg={on:true, confirmedOnly:true, sound:true, notify:true, webhook:'', telegram:true, autopaper:true, allocPct:0.10};
  try{ Object.assign(cfg, JSON.parse(localStorage.getItem(LS)||'{}')); }catch(e){}
  function save(){ try{ localStorage.setItem(LS, JSON.stringify(cfg)); }catch(e){} }

  var ctxKey=new WeakMap();   // chart -> "sym|tf|strat" baseline context
  var lastSig=new WeakMap();  // chart -> last seen signal id
  var log=[];                  // recent fired alerts (newest first)

  function dec(sym){ try{ return (SYMBOLS[sym]&&SYMBOLS[sym].dec)||2; }catch(e){ return 2; } }
  function px(v,d){ try{ return fmtPx(v,d); }catch(e){ return ''+v; } }
  function say(m){ try{ if(window._toast) window._toast(m); }catch(e){} }

  // Base URL of the local proxy (works when the dashboard is SERVED by the proxy over http/https).
  function proxyBase(){
    try{
      if(/^https?:$/.test(location.protocol)) return location.origin;
      if(window.APP&&APP.alpaca&&APP.alpaca.proxy) return (''+APP.alpaca.proxy).trim().replace(/\/+$/,'');
    }catch(e){}
    return '';
  }

  // Send a Telegram message through the proxy's /telegram-alert (uses bot_token/chat_id in gauntlet_tokens.json).
  function sendTelegram(sym,tf,strat,label,side,price){
    var b=proxyBase(); if(!b){ say('Telegram needs the dashboard opened THROUGH the proxy (http://127.0.0.1:8787/…)'); return; }
    try{
      fetch(b+'/telegram-alert',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({type:'signal',symbol:sym,timeframe:tf,strategy:label||strat,side:side,price:price})})
      .then(function(r){return r.json();})
      .then(function(j){ if(j&&j.ok===false){ say('Telegram not sent: '+(j.error||'check gauntlet_tokens.json')); } })
      .catch(function(){ say('Telegram error (is the proxy running?)'); });
    }catch(e){}
  }

  // Auto-execute a PAPER trade on a confirmed signal. Long-only, mirrors the backtest model:
  //   BUY  -> open a long (skip if already long, no pyramiding)
  //   SELL -> flatten any open long. Works for crypto (fractional) and India/stocks (whole shares).
  function autoPaper(sym, action, price){
    try{
      if(!cfg.autopaper) return;
      if(typeof window.paperOrder!=='function' || !(price>0)) return;
      var acct=window.APP&&APP.acct; if(!acct){ return; }
      var pos=acct.positions&&acct.positions[sym];
      var held=(pos&&pos.qty>0)?pos.qty:0;
      if(action==='buy'){
        if(held>0) return;                                  // already long
        var cash=Math.max(0, acct.cash||0);
        var alloc=cash*(cfg.allocPct||0.10);
        if(alloc<=0){ say('Paper: no cash left to open '+sym); return; }
        var qty=alloc/price;
        var cls=(SYMBOLS[sym]&&SYMBOLS[sym].cls)||'';
        if(cls==='india'||cls==='stock'){ qty=Math.floor(qty); }   // whole shares for equities/indices
        else { qty=Math.max(0, +qty.toFixed(6)); }                 // fractional crypto
        if(qty>0) window.paperOrder(sym,'buy',qty);
      } else if(action==='sell'){
        if(held>0) window.paperOrder(sym,'sell',held);             // close the long
      }
    }catch(e){}
  }

  function fire(chart, s){
    var sym=chart.sym, tf=chart.tf, strat=chart.strat;
    var label=(typeof STRAT_LABEL!=='undefined'&&STRAT_LABEL[strat])||strat;
    var side=s.action==='buy'?'BUY':'SELL';
    var icon=s.action==='buy'?'\uD83D\uDFE2':'\uD83D\uDD34';   // green/red circle
    var text=icon+' '+side+'  '+sym+' '+tf+'  \u00b7  '+label+'  @ '+px(s.price,dec(sym));
    try{ if(typeof toast==='function') toast(text); }catch(e){}
    if(cfg.sound){ try{ beep(); }catch(e){} }
    if(cfg.notify && ('Notification'in window) && Notification.permission==='granted'){
      try{ new Notification(icon+' '+side+' signal \u00b7 '+sym, {body:label+' '+tf+' @ '+px(s.price,dec(sym))}); }catch(e){}
    }
    if(cfg.webhook){
      try{ fireWebhook(cfg.webhook, {type:'signal', symbol:sym, timeframe:tf, strategy:strat,
            strategyLabel:label, action:s.action, side:side, price:s.price,
            time:new Date((s.time||0)*1000).toISOString()}); }catch(e){}
    }
    // Telegram (via proxy /telegram-alert — uses gauntlet_tokens.json creds, no URL needed)
    if(cfg.telegram){ try{ sendTelegram(sym, tf, strat, label, side, s.price); }catch(e){} }
    // Auto-execute the paper trade for BOTH crypto & India (long-only, matches the backtest)
    try{ autoPaper(sym, s.action, s.price); }catch(e){}
    log.unshift({t:Date.now(), side:side, sym:sym, tf:tf, label:label, price:px(s.price,dec(sym))});
    if(log.length>50) log.pop();
    renderLog();
  }

  function scan(){
    if(!cfg.on || typeof APP==='undefined' || !APP.charts) return;
    for(var ci=0; ci<APP.charts.length; ci++){
      var chart=APP.charts[ci];
      if(!chart || chart.strat==='none' || !chart.signals || !chart.signals.length) continue;
      var n=(chart.feed&&chart.feed.candles)?chart.feed.candles.length:0;
      if(!n) continue;
      var s=chart.signals[chart.signals.length-1];
      var key=chart.sym+'|'+chart.tf+'|'+chart.strat;
      var sigId=chart.strat+'@'+s.time+'/'+s.action+'#'+s.i;
      // (re)seed baseline silently when symbol/tf/strategy changes or first sight
      if(ctxKey.get(chart)!==key){ ctxKey.set(chart,key); lastSig.set(chart,sigId); continue; }
      if(lastSig.get(chart)===sigId) continue;          // nothing new
      var fresh   = s.i >= n-3;                           // ignore old/history signals
      var confirmed = s.i <= n-2;                         // bar has closed (no repaint)
      if(!fresh){ lastSig.set(chart,sigId); continue; }   // old signal: rebaseline, don't alert
      if(cfg.confirmedOnly && !confirmed) continue;       // wait for close (recheck next tick)
      lastSig.set(chart,sigId);
      fire(chart, s);
    }
  }
  setInterval(scan, 1500);

  /* ---------------- UI: topbar button + popover ---------------- */
  function el(tag,attrs,html){var e=document.createElement(tag);if(attrs)for(var k in attrs)e.setAttribute(k,attrs[k]);if(html!=null)e.innerHTML=html;return e;}
  var st=document.createElement('style');
  st.textContent=
   '#sigAlBtn{position:relative}'+
   '#sigAlBtn .cnt{position:absolute;top:-4px;right:-4px;background:#E2645A;color:#fff;font-size:9px;'+
     'min-width:14px;height:14px;border-radius:7px;display:none;align-items:center;justify-content:center;padding:0 3px}'+
   '#sigAlPop{position:fixed;top:54px;right:10px;width:300px;max-height:70vh;overflow:auto;z-index:80;'+
     'background:#121A1F;border:1px solid #34464F;border-radius:12px;padding:12px;display:none;'+
     'font-family:system-ui,sans-serif;color:#E9F0F3;box-shadow:0 10px 30px rgba(0,0,0,.5)}'+
   '#sigAlPop.on{display:block}'+
   '#sigAlPop h4{margin:0 0 8px;font-size:13px;display:flex;justify-content:space-between;align-items:center}'+
   '#sigAlPop label{display:flex;align-items:center;gap:8px;font-size:12px;margin:7px 0;cursor:pointer}'+
   '#sigAlPop input[type=text]{width:100%;background:#0C1216;border:1px solid #26343C;color:#E9F0F3;'+
     'border-radius:7px;padding:6px 8px;font-size:12px;margin-top:4px}'+
   '#sigAlPop .log{margin-top:10px;border-top:1px solid #26343C;padding-top:8px}'+
   '#sigAlPop .row{font-family:ui-monospace,monospace;font-size:11px;padding:3px 0;border-bottom:1px solid rgba(38,52,60,.5)}'+
   '#sigAlPop .row.buy{color:#4BC08F}#sigAlPop .row.sell{color:#E2645A}'+
   '#sigAlPop .mut{color:#7c8b93;font-size:10px}';
  document.head.appendChild(st);

  var pop=el('div',{id:'sigAlPop'});
  pop.innerHTML=
    '<h4>\uD83D\uDD14 Strategy signal alerts <span id="sigAlX" style="cursor:pointer;color:#90A2AB">\u2715</span></h4>'+
    '<label><input type="checkbox" id="saOn"> Alerts enabled</label>'+
    '<label><input type="checkbox" id="saConf"> Only on closed bar (no repaint)</label>'+
    '<label><input type="checkbox" id="saSound"> Sound (beep)</label>'+
    '<label><input type="checkbox" id="saNotify"> Desktop notification</label>'+
    '<label><input type="checkbox" id="saTg"> Telegram alert (uses gauntlet_tokens.json)</label>'+
    '<label><input type="checkbox" id="saPaper"> Auto paper-trade on signal (crypto + India)</label>'+
    '<div><span class="mut">Cash % per paper trade</span>'+
      '<input type="text" id="saAlloc" placeholder="0.10 = 10% of cash"></div>'+
    '<div><span class="mut">Webhook URL (optional \u2014 Discord/n8n; needs proxy /relay)</span>'+
      '<input type="text" id="saHook" placeholder="https://\u2026 (Discord/n8n)"></div>'+
    '<div class="log"><div class="mut">Recent signals</div><div id="saLog"></div></div>';
  document.body.appendChild(pop);

  function syncUI(){
    pop.querySelector('#saOn').checked=cfg.on;
    pop.querySelector('#saConf').checked=cfg.confirmedOnly;
    pop.querySelector('#saSound').checked=cfg.sound;
    pop.querySelector('#saNotify').checked=cfg.notify;
    pop.querySelector('#saTg').checked=cfg.telegram;
    pop.querySelector('#saPaper').checked=cfg.autopaper;
    pop.querySelector('#saAlloc').value=(cfg.allocPct!=null?cfg.allocPct:0.10);
    pop.querySelector('#saHook').value=cfg.webhook||'';
    var b=document.getElementById('sigAlBtn'); if(b) b.style.opacity=cfg.on?'1':'.55';
  }
  function renderLog(){
    var box=pop.querySelector('#saLog'); if(!box) return;
    if(!log.length){ box.innerHTML='<div class="mut">none yet \u2014 alerts appear here</div>'; }
    else box.innerHTML=log.map(function(r){
      var ts=new Date(r.t).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'});
      return '<div class="row '+(r.side==='BUY'?'buy':'sell')+'">'+r.side+' '+r.sym+' '+r.tf+' @ '+r.price+
             ' <span class="mut">'+r.label+' \u00b7 '+ts+'</span></div>';
    }).join('');
    var cnt=document.querySelector('#sigAlBtn .cnt'); if(cnt){ cnt.textContent=log.length; cnt.style.display=log.length?'flex':'none'; }
  }
  pop.querySelector('#saOn').onchange=function(e){cfg.on=e.target.checked;save();syncUI();};
  pop.querySelector('#saConf').onchange=function(e){cfg.confirmedOnly=e.target.checked;save();};
  pop.querySelector('#saSound').onchange=function(e){cfg.sound=e.target.checked;save();};
  pop.querySelector('#saNotify').onchange=function(e){cfg.notify=e.target.checked;save();if(cfg.notify&&typeof reqNotif==='function')reqNotif();};
  pop.querySelector('#saTg').onchange=function(e){cfg.telegram=e.target.checked;save();};
  pop.querySelector('#saPaper').onchange=function(e){cfg.autopaper=e.target.checked;save();say(cfg.autopaper?'Auto paper-trade ON — signals will open/close paper positions':'Auto paper-trade OFF');};
  pop.querySelector('#saAlloc').onchange=function(e){var v=parseFloat(e.target.value);if(isFinite(v)&&v>0&&v<=1){cfg.allocPct=v;}else{e.target.value=cfg.allocPct;}save();};
  pop.querySelector('#saHook').onchange=function(e){cfg.webhook=e.target.value.trim();save();};
  pop.querySelector('#sigAlX').onclick=function(){pop.classList.remove('on');};

  function mountBtn(){
    var bar=document.querySelector('.topbar'); if(!bar||document.getElementById('sigAlBtn')) return;
    var btn=el('button',{class:'iconbtn',id:'sigAlBtn',title:'Strategy buy/sell alerts'},'\uD83D\uDD14 Alerts<span class="cnt"></span>');
    var alp=document.getElementById('alpacaBtn');
    if(alp&&alp.parentNode) alp.parentNode.insertBefore(btn, alp); else bar.appendChild(btn);
    btn.onclick=function(){ pop.classList.toggle('on'); syncUI(); renderLog(); if(cfg.notify&&typeof reqNotif==='function')reqNotif(); };
    syncUI(); renderLog();
  }
  if(document.readyState!=='loading') setTimeout(mountBtn,500);
  window.addEventListener('load', function(){ setTimeout(mountBtn,700); });
})();
</script>

<script>
/* ============================================================
   ASK CLAUDE  —  in-dashboard AI copilot (added 2026-06-22)
   A chat panel that sees your active chart (symbol, timeframe, strategy,
   position, recent signals, last closes) and answers questions about it.
   Calls api.anthropic.com THROUGH your proxy route /anthropic, so the
   API key stays out of this file. Set ANTHROPIC_API_KEY for the proxy,
   or paste a key in the panel (stored only in this browser).
   Educational analysis, not financial advice.
   ============================================================ */
(function(){
  var KEYLS='gl_anthropic_key', MODLS='gl_anthropic_model';
  var apiKey=''; try{ apiKey=localStorage.getItem(KEYLS)||''; }catch(e){}
  var model=''; try{ model=localStorage.getItem(MODLS)||'claude-sonnet-4-6'; }catch(e){ model='claude-sonnet-4-6'; }
  var history=[];   // {role, content}

  function base(){
    if(/^https?:$/.test(location.protocol)) return location.origin;
    if(typeof APP!=='undefined' && APP.alpaca && APP.alpaca.proxy) return (''+APP.alpaca.proxy).replace(/\/+$/,'');
    return '';
  }
  function dec(s){ try{ return (SYMBOLS[s]&&SYMBOLS[s].dec)||2; }catch(e){ return 2; } }
  function fpx(v,d){ try{ return fmtPx(v,d); }catch(e){ return ''+v; } }

  function context(){
    try{
      var ch=(APP.activeChart)||(APP.charts&&APP.charts[0]); if(!ch) return 'No chart is open.';
      var m=SYMBOLS[ch.sym]||{}, d=dec(ch.sym);
      var last=(ch.feed&&ch.feed.last)?ch.feed.last():null;
      var pos=ch._position?ch._position():{long:false,pnl:0};
      var sigs=(ch.signals||[]).slice(-6).map(function(s){return s.action.toUpperCase()+'@'+fpx(s.price,d);}).join(', ')||'none';
      var cs=(ch.feed&&ch.feed.candles)?ch.feed.candles:[];
      var closes=cs.slice(-12).map(function(c){return fpx(c.c,d);}).join(', ');
      var lbl=(typeof STRAT_LABEL!=='undefined'&&STRAT_LABEL[ch.strat])||ch.strat;
      return 'ACTIVE CHART CONTEXT\n'
        +'Symbol: '+ch.sym+' ('+(m.name||'')+'), class '+(m.cls||'')+'\n'
        +'Timeframe: '+ch.tf+'   Mode: '+(APP.mode||'')+'\n'
        +'Strategy: '+lbl+'\n'
        +'Position: '+(pos.long?('LONG '+(pos.pnl>=0?'+':'')+pos.pnl.toFixed(2)+'%'):'FLAT')+'\n'
        +'Last price: '+(last!=null?fpx(last,d):'n/a')+'\n'
        +'Recent signals (old→new): '+sigs+'\n'
        +'Last 12 closes (old→new): '+closes;
    }catch(e){ return 'Context unavailable: '+e.message; }
  }

  var SYS = 'You are Claude, an analytical trading copilot embedded in the user\'s "Gauntlet" charting dashboard. '
    +'You receive a live CONTEXT block describing the user\'s active chart (symbol, timeframe, strategy, position, recent buy/sell signals, recent closes). '
    +'Help them understand what they are seeing: explain the active strategy\'s logic, interpret indicators and the latest signals, discuss risk management, position sizing, reward:risk, and backtest interpretation. '
    +'Be concise and concrete; use the context. When you reference a number, tie it to the context. '
    +'You are educational, not a licensed financial adviser: do not give definitive buy/sell directives or guarantee outcomes; frame ideas as analysis and always respect risk. '
    +'If asked for live external facts you cannot see, say so. Keep answers tight unless asked to go deep.';

  function add(role, text){
    var box=document.getElementById('acMsgs'); if(!box) return;
    var div=document.createElement('div'); div.className='acmsg '+role;
    div.innerHTML='<div class="who">'+(role==='user'?'You':'Claude')+'</div><div class="txt"></div>';
    div.querySelector('.txt').textContent=text;
    box.appendChild(div); box.scrollTop=box.scrollHeight; return div.querySelector('.txt');
  }

  async function send(){
    var ta=document.getElementById('acIn'); var q=(ta.value||'').trim(); if(!q) return;
    ta.value=''; add('user', q);
    var withCtx = context()+'\n\nUSER: '+q;
    history.push({role:'user', content: withCtx});
    var thinking=add('assistant', '…'); var sendBtn=document.getElementById('acSend'); sendBtn.disabled=true;
    try{
      var headers={'Content-Type':'application/json'};
      if(apiKey) headers['x-anthropic-key']=apiKey;
      var r=await fetch(base()+'/anthropic/v1/messages', {method:'POST', headers:headers,
        body: JSON.stringify({ model: model, max_tokens: 1024, system: SYS,
          messages: history.slice(-12) }) });
      var j=await r.json().catch(function(){return {};});
      if(!r.ok || j.error){
        var msg=(j.error&&(j.error.message||j.message))||j.message||('HTTP '+r.status);
        if(j.error==='no_key' || /no_key/.test(JSON.stringify(j))){ msg='No API key. Click ⚙ in this panel and paste your Anthropic key (or set ANTHROPIC_API_KEY for the proxy).'; openKey(); }
        else if(r.status===404 || /not_found/i.test(JSON.stringify(j))){ msg='Your API key cannot access "'+model+'" (it 404s — that model isn\u2019t enabled on your Anthropic account/tier). Refreshing the list to only models your key can use; pick another and resend.'; loadModels(); }
        thinking.textContent='⚠ '+msg; history.pop();
      } else {
        var text=(j.content||[]).filter(function(b){return b.type==='text';}).map(function(b){return b.text;}).join('\n').trim()||'(empty reply)';
        thinking.textContent=text; history.push({role:'assistant', content:text});
      }
    }catch(e){ thinking.textContent='⚠ '+e.message+' (is the proxy running?)'; history.pop(); }
    sendBtn.disabled=false;
  }

  /* ---------------- UI ---------------- */
  var st=document.createElement('style');
  st.textContent=
   '#acPanel{position:fixed;top:0;right:-380px;width:370px;max-width:92vw;height:100vh;height:100dvh;z-index:90;'+
     'background:#101820;border-left:1px solid #34464F;display:flex;flex-direction:column;'+
     'transition:right .22s;font-family:system-ui,sans-serif;color:#E9F0F3}'+
   '#acPanel.on{right:0}'+
   '#acPanel header{display:flex;align-items:center;gap:8px;padding:12px 12px;border-bottom:1px solid #26343C;'+
     'background:linear-gradient(180deg,#141d23,#101820)}'+
   '#acPanel header b{font-size:14px}#acPanel header .sp{flex:1}'+
   '#acPanel header .ic{cursor:pointer;color:#90A2AB;font-size:15px;padding:4px 7px;border-radius:6px}'+
   '#acPanel header .ic:hover{background:#1E2A31}'+
   '#acMsgs{flex:1;overflow:auto;padding:12px;display:flex;flex-direction:column;gap:10px}'+
   '.acmsg{font-size:13px;line-height:1.5}.acmsg .who{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:#5E727C;margin-bottom:3px}'+
   '.acmsg.user .txt{background:#1E2A31;border:1px solid #34464F;border-radius:10px;padding:8px 10px;white-space:pre-wrap}'+
   '.acmsg.assistant .txt{background:#0C1216;border:1px solid #26343C;border-radius:10px;padding:8px 10px;white-space:pre-wrap}'+
   '#acKeyRow{display:none;padding:10px 12px;border-top:1px solid #26343C;background:#0C1216}'+
   '#acKeyRow.on{display:block}#acKeyRow input{width:100%;background:#101820;border:1px solid #34464F;color:#E9F0F3;border-radius:7px;padding:7px;font-size:12px}'+
   '#acFoot{padding:10px 12px;border-top:1px solid #26343C;display:flex;gap:8px;align-items:flex-end}'+
   '#acIn{flex:1;background:#0C1216;border:1px solid #34464F;color:#E9F0F3;border-radius:9px;padding:8px;font-size:13px;'+
     'resize:none;height:54px;font-family:inherit}'+
   '#acSend{background:#E3A742;color:#101820;border:0;border-radius:9px;font-weight:600;padding:0 14px;height:38px;cursor:pointer}'+
   '#acSend:disabled{opacity:.5;cursor:default}'+
   '#acMod{background:#0C1216;color:#90A2AB;border:1px solid #26343C;border-radius:6px;font-size:11px;padding:3px}'+
   '.acmut{font-size:10px;color:#5E727C;padding:0 12px 8px}';
  document.head.appendChild(st);

  var p=document.createElement('div'); p.id='acPanel';
  p.innerHTML=
    '<header><b>\u2726 Ask Claude</b><span class="acmut" style="padding:0">market copilot</span><span class="sp"></span>'+
      '<select id="acMod" title="Model">'+
        '<option value="claude-sonnet-4-6">Sonnet 4.6</option>'+
        '<option value="claude-opus-4-8">Opus 4.8</option>'+
        '<option value="claude-haiku-4-5-20251001">Haiku 4.5</option>'+
      '</select>'+
      '<span class="ic" id="acKeyBtn" title="API key">\u2699</span>'+
      '<span class="ic" id="acClear" title="Clear chat">\u21bb</span>'+
      '<span class="ic" id="acClose" title="Close">\u2715</span></header>'+
    '<div id="acMsgs"></div>'+
    '<div class="acmut">Claude can see your active chart. Analysis only \u2014 not financial advice.</div>'+
    '<div id="acKeyRow"><input id="acKey" type="password" placeholder="Anthropic API key (sk-ant-\u2026) \u2014 stored in this browser only"></div>'+
    '<div id="acFoot"><textarea id="acIn" placeholder="Ask about this chart, the strategy, the signals, risk\u2026"></textarea>'+
      '<button id="acSend">Send</button></div>';
  document.body.appendChild(p);

  function openKey(){ document.getElementById('acKeyRow').classList.add('on'); document.getElementById('acKey').focus(); }
  document.getElementById('acMod').value=model;
  document.getElementById('acKey').value=apiKey;
  document.getElementById('acMod').onchange=function(e){ model=e.target.value; try{localStorage.setItem(MODLS,model);}catch(_){} };
  document.getElementById('acKey').onchange=function(e){ apiKey=e.target.value.trim(); try{localStorage.setItem(KEYLS,apiKey);}catch(_){} loadModels(); };
  document.getElementById('acKeyBtn').onclick=function(){ document.getElementById('acKeyRow').classList.toggle('on'); };
  document.getElementById('acClose').onclick=function(){ p.classList.remove('on'); };
  document.getElementById('acClear').onclick=function(){ history=[]; document.getElementById('acMsgs').innerHTML=''; };
  document.getElementById('acSend').onclick=send;
  document.getElementById('acIn').addEventListener('keydown', function(e){ if(e.key==='Enter'&&(e.metaKey||e.ctrlKey)){ e.preventDefault(); send(); } });

  var FALLBACK_MODELS=[['claude-sonnet-4-6','Sonnet 4.6'],['claude-opus-4-8','Opus 4.8'],['claude-haiku-4-5-20251001','Haiku 4.5']];
  function setModels(list){
    var sel=document.getElementById('acMod'); if(!sel) return;
    sel.innerHTML=list.map(function(m){var id=m[0],nm=m[1]||m[0];return '<option value="'+id+'">'+nm+'</option>';}).join('');
    // keep saved model only if it's actually available; else default to first
    var ids=list.map(function(m){return m[0];});
    if(ids.indexOf(model)<0){ model=ids[0]; try{localStorage.setItem(MODLS,model);}catch(_){ } }
    sel.value=model;
  }
  async function loadModels(){
    try{
      var headers={}; if(apiKey) headers['x-anthropic-key']=apiKey;
      var r=await fetch(base()+'/anthropic/v1/models', {headers:headers});
      var j=await r.json().catch(function(){return {};});
      if(r.ok && j.data && j.data.length){
        // only chat models (skip embeddings etc. if any); keep order newest-first from API
        var list=j.data.filter(function(m){return /claude/i.test(m.id);})
                       .map(function(m){return [m.id, m.display_name||m.id];});
        if(list.length){ setModels(list); return; }
      }
    }catch(e){}
    setModels(FALLBACK_MODELS);   // offline / no key yet -> show defaults
  }

  function mount(){
    var bar=document.querySelector('.topbar'); if(!bar||document.getElementById('acBtn')) return;
    var b=document.createElement('button'); b.className='iconbtn'; b.id='acBtn'; b.title='Ask Claude about this chart'; b.textContent='\u2726 Ask Claude';
    var ref=document.getElementById('sigAlBtn')||document.getElementById('alpacaBtn');
    if(ref&&ref.parentNode) ref.parentNode.insertBefore(b, ref); else bar.appendChild(b);
    b.onclick=function(){ p.classList.toggle('on'); if(p.classList.contains('on')&&!document.getElementById('acMsgs').children.length){ add('assistant','Hi — I can see your active chart. Ask me about the strategy, the latest signals, indicators, or risk. (Cmd/Ctrl+Enter to send.)'); } };
    loadModels();   // populate dropdown from YOUR key's available models (no 404s)
  }
  if(document.readyState!=='loading') setTimeout(mount,600);
  window.addEventListener('load', function(){ setTimeout(mount,800); });
})();
</script>
